version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: go_app_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d go_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  go-app:
    build: ./go-app
    # ports:                  -> nginx kurduğumuz için buna gerek kalmadı
    #   - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      - DATABASE_URL=host=db user=admin password=secretpassword dbname=go_app_db port=5432 sslmode=disable

  n8n:
    image: n8nio/n8n
    user: "root"
    ports:
      - "5678:5678"
    environment:
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
      - WEBHOOK_URL=http://n8n:5678
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - ./n8n_data:/home/node/.n8n

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go-app

volumes:
  n8n_data:
  pgdata: